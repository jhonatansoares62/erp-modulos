server:
  port: 8081

spring:
  application:
    name: api-email
  datasource:
    url: jdbc:postgresql://localhost:5432/db_api_email
    username: erp_calhas
    password: erp_calhas_dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  # SMTP não é mais configurado aqui — gerenciado via API /api/contas
  mail:
    host: localhost
    port: 25
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html

# Configurações do módulo
modulo:
  versao: 1.0.0
  api-key: ${API_KEY:}
  email:
    max-tentativas: 3
    intervalo-fila: 30000

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
