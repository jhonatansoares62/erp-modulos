<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2 style="color: #333;">Resumo Diario - <span th:text="${data}">00/00/0000</span></h2>
    <p>Segue o resumo de alertas do sistema para hoje:</p>
    <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
        <tr style="background: #f5f5f5;" th:if="${totalParcelasVencidas > 0}">
            <td style="padding: 10px; border: 1px solid #ddd;"><strong>Parcelas Vencidas</strong></td>
            <td style="padding: 10px; border: 1px solid #ddd; text-align: center; font-weight: bold; color: #c62828;" th:text="${totalParcelasVencidas}">0</td>
        </tr>
        <tr th:if="${totalOsAtrasadas > 0}">
            <td style="padding: 10px; border: 1px solid #ddd;"><strong>OS Atrasadas</strong></td>
            <td style="padding: 10px; border: 1px solid #ddd; text-align: center; font-weight: bold; color: #e65100;" th:text="${totalOsAtrasadas}">0</td>
        </tr>
        <tr style="background: #f5f5f5;" th:if="${totalEstoqueCritico > 0}">
            <td style="padding: 10px; border: 1px solid #ddd;"><strong>Estoque Critico</strong></td>
            <td style="padding: 10px; border: 1px solid #ddd; text-align: center; font-weight: bold; color: #f57f17;" th:text="${totalEstoqueCritico}">0</td>
        </tr>
    </table>
    <p>Acesse o sistema para mais detalhes e tomar as acoes necessarias.</p>
    <p style="color: #666; font-size: 12px;">Este e um email automatico, nao responda.</p>
</body>
</html>
